<!DOCTYPE html>
<html>

<head>
    <title>SendDirect WebRTC Test</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
</head>

<body>

<input
        type="file"
        id="fileInput"
>

<button onclick="sendOffer()">
    Connect
</button>

<div id="chat"></div>

<script>

    let stompClient;

    const clientName =
        prompt(
            "Enter your name"
        );

    const pendingCandidates=[];

    const CHUNK_SIZE=
        16*1024;

    let selectedFile;



    document
        .getElementById(
            "fileInput"
        )
        .addEventListener(

            "change",

            function(event){

                selectedFile=
                    event.target.files[0];

                console.log(

                    "Selected File:",

                    selectedFile

                );

            }

        );



    const peerConnection=
        new RTCPeerConnection();



    const dataChannel=
        peerConnection
            .createDataChannel(
                "fileTransfer"
            );



    peerConnection.ondatachannel=
        function(event){

            console.log(
                "Incoming DataChannel"
            );

            const receiveChannel=
                event.channel;


            receiveChannel.onopen=
                function(){

                    console.log(
                        "Receiver DataChannel Opened"
                    );

                };


            receiveChannel.onmessage=
                function(event){

                    if(
                        event.data instanceof ArrayBuffer
                    ){

                        console.log(

                            "Received bytes:",

                            event.data.byteLength

                        );

                    }

                    else{

                        console.log(
                            event.data
                        );

                    }

                };

        };



    dataChannel.onopen=
        async function(){

            console.log(
                "DataChannel Opened"
            );


            if(
                !selectedFile
            ){

                console.log(
                    "No file selected"
                );

                return;

            }


            const buffer=
                await selectedFile
                    .arrayBuffer();


            console.log(

                "Buffer Size:",

                buffer.byteLength

            );


            let offset=0;


            while(
                offset<
                buffer.byteLength
            ){

                const chunk=
                    buffer.slice(

                        offset,

                        offset+
                        CHUNK_SIZE

                    );


                dataChannel.send(
                    chunk
                );


                console.log(

                    "Sent chunk:",

                    offset

                );


                offset+=
                    CHUNK_SIZE;

            }

        };



    dataChannel.onmessage=
        function(event){

            console.log(
                "Received:",
                event.data
            );

        };



    peerConnection.onconnectionstatechange=
        function(){

            console.log(

                "Connection State:",

                peerConnection
                    .connectionState

            );

        };



    peerConnection.onicecandidate=
        function(event){

            if(
                event.candidate
            ){

                stompClient.send(

                    "/app/chat",

                    {},

                    JSON.stringify({

                        sender:
                            clientName,

                        shareCode:
                            "AB12XY",

                        type:
                            "candidate",

                        content:
                            JSON.stringify(
                                event.candidate
                            )

                    })

                );

            }

        };



    const socket=
        new SockJS(
            "http://localhost:8080/ws"
        );



    stompClient=
        Stomp.over(
            socket
        );



    stompClient.connect(

        {},

        function(){

            console.log(
                "Connected"
            );

            stompClient.subscribe(

                "/topic/session/AB12XY",

                async function(response){

                    const msg=
                        JSON.parse(
                            response.body
                        );


                    if(
                        msg.sender===
                        clientName
                    ){

                        return;

                    }



                    if(
                        msg.type===
                        "offer"
                    ){

                        const offer=
                            JSON.parse(
                                msg.content
                            );


                        await peerConnection
                            .setRemoteDescription(
                                offer
                            );


                        while(

                            pendingCandidates
                                .length>0

                        ){

                            await peerConnection
                                .addIceCandidate(

                                    pendingCandidates
                                        .shift()

                                );

                        }


                        const answer=
                            await peerConnection
                                .createAnswer();


                        await peerConnection
                            .setLocalDescription(
                                answer
                            );


                        stompClient.send(

                            "/app/chat",

                            {},

                            JSON.stringify({

                                sender:
                                    clientName,

                                shareCode:
                                    "AB12XY",

                                type:
                                    "answer",

                                content:
                                    JSON.stringify(
                                        answer
                                    )

                            })

                        );

                    }


                    else if(
                        msg.type===
                        "answer"
                    ){

                        const answer=
                            JSON.parse(
                                msg.content
                            );


                        await peerConnection
                            .setRemoteDescription(
                                answer
                            );


                        while(

                            pendingCandidates
                                .length>0

                        ){

                            await peerConnection
                                .addIceCandidate(

                                    pendingCandidates
                                        .shift()

                                );

                        }

                    }


                    else if(
                        msg.type===
                        "candidate"
                    ){

                        const candidate=
                            JSON.parse(
                                msg.content
                            );


                        if(

                            peerConnection
                                .remoteDescription

                        ){

                            await peerConnection
                                .addIceCandidate(
                                    candidate
                                );

                        }

                        else{

                            pendingCandidates
                                .push(
                                    candidate
                                );

                        }

                    }

                }

            );

        }

    );



    async function sendOffer(){

        const offer=
            await peerConnection
                .createOffer();


        await peerConnection
            .setLocalDescription(
                offer
            );


        stompClient.send(

            "/app/chat",

            {},

            JSON.stringify({

                sender:
                    clientName,

                shareCode:
                    "AB12XY",

                type:
                    "offer",

                content:
                    JSON.stringify(
                        offer
                    )

            })

        );

    }

</script>

</body>

</html>
