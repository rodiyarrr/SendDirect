
<!DOCTYPE html>
<html>
<head>
    <title>SendDirect</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>

        body{

        display:flex;
        justify-content:center;
        align-items:center;

        height:100vh;

        background:#0f172a;

        font-family:Arial;

        color:white;

        }


        .container{

        width:450px;

        padding:30px;

        border-radius:20px;

        background:#1e293b;

        text-align:center;

        box-shadow:

        0 0 30px
        rgba(
        0,
        0,
        0,
        0.4
        );

        }


        button{

        padding:12px 18px;

        margin:10px;

        border:none;

        border-radius:10px;

        cursor:pointer;

        font-size:15px;

        }


        button:hover{

        transform:scale(
        1.05
        );

        transition:.3s;

        }


        input{

        margin:15px;

        }
        #dropZone{

border:

2px dashed
#64748b;

padding:40px;

margin:20px;

border-radius:15px;

cursor:pointer;

transition:.3s;

}


#dropZone:hover{

background:#334155;

}
#fileInfo{

margin-top:20px;

padding:15px;

border-radius:10px;

background:#334155;

display:none;

}
    </style>

</head>
<body>

<div class="container">
    <h1>SendDirect </h1>

    <p>
        Fast Peer-to-Peer File Sharing
    </p>

    <div id="dropZone">

         Drag & Drop Files Here

        <br><br>
        <span>or click to browse</span>

    </div>
    <div id="fileInfo"></div>
<input type="file" id="fileInput"   hidden>
<button onclick="createSession()">Send Files</button>
<button onclick="joinSession()">Receive Files</button>

<div id="session"></div>
<div id="qrcode"></div>
</div>
<script>
    let stompClient;
    const clientName=prompt("Enter name");
    let shareCode=null;

    const pendingCandidates=[];
    const CHUNK_SIZE=16*1024;

    let selectedFile;
    let receivedChunks=[];
    let fileMetadata=null;
    let receivedBytes=0;

    document
.getElementById(
"fileInput"
)
.addEventListener(

"change",

function(event){

selectedFile =
event.target.files[0];


console.log(
"Selected:",
selectedFile
);


document
.getElementById(
"dropZone"
)
.innerHTML=

"📄 "
+
selectedFile.name;


document
.getElementById(
"fileInfo"
)
.style.display=
"block";


document
.getElementById(
"fileInfo"
)
.innerHTML=

"📄 "
+ selectedFile.name

+ "<br><br>"

+ "Size: "

+ (
selectedFile.size
/
1024
/
1024
).toFixed(2)

+ " MB";

}

);


    dropZone.onclick=
    function(){

    document
    .getElementById(
    "fileInput"
    )
    .click();

    };



    dropZone.ondragover=
    function(event){

    event.preventDefault();

    dropZone.style.background=
    "#334155";

    };



    dropZone.ondragleave=
    function(){

    dropZone.style.background=
    "";

    };



    dropZone.ondrop=
    function(event){

    event.preventDefault();

    dropZone.style.background=
    "";


    selectedFile=
    event.dataTransfer.files[0];


    console.log(
    selectedFile
    );
    document
.getElementById(
"fileInfo"
)
.style.display=
"block";


document
.getElementById(
"fileInfo"
)
.innerHTML=

"📄 "
+ selectedFile.name

+ "<br><br>"

+ "Size: "

+ (
selectedFile.size/
1024
/1024
).toFixed(2)

+ " MB";
    };

    const peerConnection=
new RTCPeerConnection({

iceServers:[

{
urls:
"stun:stun.l.google.com:19302"
},

{
urls:
"turn:openrelay.metered.ca:80",

username:
"openrelayproject",

credential:
"openrelayproject"
}

]

});

    const dataChannel=peerConnection.createDataChannel("fileTransfer");

    peerConnection.ondatachannel=(event)=>{
     const receiveChannel=event.channel;

     receiveChannel.onmessage=(event)=>{

       if(typeof event.data==="string"){

          const data=JSON.parse(event.data);

          if(data.type==="metadata"){
              fileMetadata=data;
              receivedChunks=[];
              receivedBytes=0;
          }

       }else{

          receivedChunks.push(event.data);
          receivedBytes+=event.data.byteLength;

          console.log(
            receivedBytes+"/"+fileMetadata.fileSize
          );

          if(receivedBytes>=fileMetadata.fileSize){

            const blob=new Blob(
                receivedChunks,
                {type:fileMetadata.fileType}
            );

            const url=URL.createObjectURL(blob);

            const a=document.createElement("a");

            a.href=url;
            a.download=fileMetadata.fileName;

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            URL.revokeObjectURL(url);

            console.log("Transfer Complete");
          }
       }
     };
    };

    dataChannel.onopen=async()=>{

     if(!selectedFile){
       console.log("No file selected");
       return;
     }

     dataChannel.send(JSON.stringify({
        type:"metadata",
        fileName:selectedFile.name,
        fileSize:selectedFile.size,
        fileType:selectedFile.type
     }));

     const buffer=await selectedFile.arrayBuffer();

     let offset=0;

     while(offset<buffer.byteLength){

        const chunk=buffer.slice(
          offset,
          offset+CHUNK_SIZE
        );

        dataChannel.send(chunk);

        offset+=CHUNK_SIZE;

        await new Promise(
          r=>setTimeout(r,10)
        );
     }
    };

    peerConnection.onicecandidate=(event)=>{

     if(event.candidate){

       stompClient.send(
          "/app/chat",
          {},
          JSON.stringify({
            sender:clientName,
            shareCode:shareCode,
            type:"candidate",
            content:JSON.stringify(event.candidate)
          })
       );

     }

    };

    function subscribeToSession(){

    stompClient.subscribe(
    "/topic/session/"+shareCode,

    async(response)=>{

    const msg=JSON.parse(response.body);

    if(msg.sender===clientName) return;

    if(msg.type==="ready"){

     if(selectedFile){
       sendOffer();
     }

     return;
    }

    if(msg.type==="offer"){

    const offer=JSON.parse(msg.content);

    await peerConnection.setRemoteDescription(offer);

    while(pendingCandidates.length>0){
     await peerConnection.addIceCandidate(
       pendingCandidates.shift()
     );
    }

    const answer=await peerConnection.createAnswer();

    await peerConnection.setLocalDescription(answer);

    stompClient.send(
    "/app/chat",
    {},
    JSON.stringify({
    sender:clientName,
    shareCode:shareCode,
    type:"answer",
    content:JSON.stringify(answer)
    })
    );

    }

    else if(msg.type==="answer"){

    await peerConnection.setRemoteDescription(
    JSON.parse(msg.content)
    );

    }

    else if(msg.type==="candidate"){

    const candidate=JSON.parse(msg.content);

    if(peerConnection.remoteDescription){

    await peerConnection.addIceCandidate(candidate);

    }else{

    pendingCandidates.push(candidate);

    }

    }

    });
    }

    async function createSession(){

    const response=await fetch(
    "/api/session/create",
    {method:"POST"}
    );

    const data=await response.json();

    shareCode=data.shareCode;

    document.getElementById(
"session"
).innerHTML=

"Share Code: "
+shareCode;


document.getElementById(
"qrcode"
).innerHTML="";


new QRCode(

document.getElementById(
"qrcode"
),

{

text:

window.location.origin
+"/receive?code="
+shareCode,

width:200,

height:200

}

);

    subscribeToSession();
    }

    async function joinSession(){

    shareCode=prompt("Enter share code");

    await fetch(
    "/api/session/join/"+shareCode
    );

    document.getElementById("session").innerHTML=
    "Joined: "+shareCode;

    subscribeToSession();

    stompClient.send(
    "/app/chat",
    {},
    JSON.stringify({
    sender:clientName,
    shareCode:shareCode,
    type:"ready",
    content:"joined"
    })
    );

    }

    async function sendOffer(){

    const offer=await peerConnection.createOffer();

    await peerConnection.setLocalDescription(
    offer
    );

    stompClient.send(
    "/app/chat",
    {},
    JSON.stringify({
    sender:clientName,
    shareCode:shareCode,
    type:"offer",
    content:JSON.stringify(offer)
    })
    );

    }

    const socket =
new SockJS(

window.location.origin
+"/ws"

);
    stompClient=Stomp.over(socket);

    stompClient.connect(

{},

function(frame){

    console.log(
        "Connected:",
        frame
    );

},

function(error){

    console.error(
        "STOMP Error:",
        error
    );

}

);

</script>
</body>
</html>
